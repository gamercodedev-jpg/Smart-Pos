<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profit Maker POS</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
        color: white;
        font-family: Inter, system-ui, sans-serif;
      }
      .splash {
        text-align: center;
      }
      .title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        font-size: 1rem;
        opacity: 0.9;
      }
      .loader {
        margin-top: 1rem;
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: rgba(255, 255, 255, 1);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="title">Profit Maker POS</div>
      <div class="subtitle">Starting up... please wait</div>
      <div class="loader"></div>
    </div>
  </body>
</html>
